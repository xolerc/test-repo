  <svg style="position:absolute;width:0;height:0">
    <defs>
      <filter id="pixelate">
        <feFlood x="4" y="4" height="2" width="2"/>
        <feComposite width="8" height="8"/>
        <feTile result="a"/>
        <feComposite in="SourceGraphic" in2="a" operator="in"/>
        <feMorphology operator="dilate" radius="4"/>
      </filter>
      <filter id="pixelate2">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feColorMatrix type="saturate" values="0" in="blur" result="gray"/>
        <feComponentTransfer in="gray" result="sharp">
          <feFuncA type="discrete" tableValues="0 1"/>
        </feComponentTransfer>
      </filter>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    body { cursor: none; }

    .scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    .layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .layer-bg {
      background-image: url('images/bg.png');
      z-index: 1;
    }

    .layer-main {
      background-image: url('images/main.png');
      z-index: 2;
    }

    .reveal {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      background-image: url('images/bg.png');
      background-size: cover;
      background-position: -45px center;
      mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%);
      transition: filter 0.5s ease;
    }

    canvas#particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    canvas#effectCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 5;
      pointer-events: none;
    }

    .cursor-dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    canvas#lightning {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9;
      pointer-events: none;
    }

    .welcome {
      position: fixed;
      bottom: 95px;
      left: 40%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 2.5vw;
      font-weight: 900;
      text-transform: uppercase;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      letter-spacing: 4px;
      text-align: center;
      white-space: nowrap;
      font-family: 'Arial Black', Impact, sans-serif;
    }

    .welcome .letter {
      display: inline-block;
      color: rgba(230, 230, 230, 0.9);
      opacity: 0;
      transform: translateY(30px) scale(0.8) rotateX(-45deg);
      transition: opacity 0.6s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      white-space: pre;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0), 0 0 20px rgba(0, 255, 255, 0);
    }

    .welcome .letter.visible {
      opacity: 1;
      transform: translateY(0) scale(1) rotateX(0);
      animation: softGlow 3s infinite alternate ease-in-out;
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1),
                  text-shadow 0.4s ease,
                  color 0.4s ease;
      will-change: transform, text-shadow;
    }

    @keyframes softGlow {
      0% { text-shadow: 0 0 10px rgba(74, 144, 226, 0.3), 0 0 20px rgba(74, 144, 226, 0.1); }
      100% { text-shadow: 0 0 20px rgba(74, 144, 226, 0.6), 0 0 40px rgba(74, 144, 226, 0.3); }
    }

    @media (max-width: 768px) {
      .welcome { font-size: 8vw; }
    }

    .orbit-container {
      position: fixed;
      top: 120px;
      right: 160px;
      transform: none;
      width: 0;
      height: 0;
      z-index: 10;
      pointer-events: none;
    }

    .orbit-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 400px;
      height: 400px;
      margin-top: -200px;
      margin-left: -200px;
      animation: orbitSpin 45s linear infinite;
    }

    @keyframes orbitSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .orbit-ring .social-icon {
      position: absolute;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: auto;
      cursor: none;
      transition: background 0.3s, filter 0.3s;
    }

    .orbit-ring .social-icon:hover {
      background: rgba(255,255,255,0.25);
      filter: scale(1.2);
    }

    .orbit-ring .social-icon svg {
      width: 18px;
      height: 18px;
      fill: #e10600;
    }

    .social-icon {
      position: absolute;
      top: 50%;
      left: 50%;
    }

    .social-icon:nth-child(1) { transform: rotate(0deg) translateX(200px) rotate(0deg); }
    .social-icon:nth-child(2) { transform: rotate(60deg) translateX(200px) rotate(-60deg); }
    .social-icon:nth-child(3) { transform: rotate(120deg) translateX(200px) rotate(-120deg); }
    .social-icon:nth-child(4) { transform: rotate(180deg) translateX(200px) rotate(-180deg); }
    .social-icon:nth-child(5) { transform: rotate(240deg) translateX(200px) rotate(-240deg); }
    .social-icon:nth-child(6) { transform: rotate(300deg) translateX(200px) rotate(-300deg); }

    .social-icon:nth-child(1) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(2) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(3) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(4) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(5) { margin-top: -19px; margin-left: -19px; }
    .social-icon:nth-child(6) { margin-top: -19px; margin-left: -19px; }

    .scroll-hint {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }

    .scroll-hint svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: rgba(255,255,255,0.5);
      stroke-width: 2;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* ═══════════════════════════════════════════
       NAVIGATION BAR
    ═══════════════════════════════════════════ */

    .effect-nav {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 100;
      pointer-events: none;
    }

    .effect-nav button {
      pointer-events: auto;
      cursor: none;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.7);
      font-size: 18px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      user-select: none;
    }

    .effect-nav button:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.4);
      color: #fff;
      transform: scale(1.08);
    }

    .effect-nav button:active {
      transform: scale(0.95);
    }

    .effect-label {
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 180px;
    }

    .effect-name {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      white-space: nowrap;
      transition: opacity 0.3s ease;
    }

    .effect-counter {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      letter-spacing: 2px;
    }

    .effect-dots {
      display: flex;
      gap: 5px;
      margin-top: 2px;
    }

    .effect-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      transition: all 0.4s ease;
    }

    .effect-dots span.active {
      background: rgba(255,255,255,0.8);
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
      transform: scale(1.3);
    }

    @media (max-width: 768px) {
      .cursor-dot { display: none; }
      body { cursor: auto; }
      .orbit-ring .social-icon { cursor: pointer; }
      .scroll-hint { display: flex; }
      .orbit-ring { width: 160px; height: 160px; margin-top: -80px; margin-left: -80px; }
      .social-icon:nth-child(1) { transform: rotate(0deg) translateX(80px) rotate(0deg); }
      .social-icon:nth-child(2) { transform: rotate(60deg) translateX(80px) rotate(-60deg); }
      .social-icon:nth-child(3) { transform: rotate(120deg) translateX(80px) rotate(-120deg); }
      .social-icon:nth-child(4) { transform: rotate(180deg) translateX(80px) rotate(-180deg); }
      .social-icon:nth-child(5) { transform: rotate(240deg) translateX(80px) rotate(-240deg); }
      .social-icon:nth-child(6) { transform: rotate(300deg) translateX(80px) rotate(-300deg); }
      .effect-nav button { cursor: pointer; }
      .effect-nav { bottom: 16px; gap: 10px; }
      .effect-nav button { width: 38px; height: 38px; font-size: 16px; }
      .effect-name { font-size: 11px; min-width: 140px; }
    }

    @media (min-width: 769px) {
      .scroll-hint { display: none; }
    }
  </style>
</head>

  <script>
    // ═══════════════════════════════════════════
    // 20 REVEAL EFFECT VARIANTS
    // ═══════════════════════════════════════════

    const EFFECTS = [
      {
        name: 'Original',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'none'
      },
      {
        name: 'Soft Glow',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r * 1.2}px at ${cx}px ${cy}px, black 0%, black 25%, transparent 100%)`,
        filter: 'none'
      },
      {
        name: 'Hard Edge',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 98%, black 99%, transparent 100%)`,
        filter: 'none'
      },
      {
        name: 'Invert Zone',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'invert(1)'
      },
      {
        name: 'Blur Reveal',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'blur(4px)'
      },
      {
        name: 'Saturate Max',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'saturate(3) brightness(1.1)'
      },
      {
        name: 'Grayscale',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'grayscale(1) brightness(1.1)'
      },
      {
        name: 'Sepia Vintage',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'sepia(0.9) contrast(1.1) brightness(0.95)'
      },
      {
        name: 'Hue Rotate',
        mask: (cx, cy, r) => {
          const hue = (performance.now() * 0.1) % 360;
          return `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
        },
        filter: () => `hue-rotate(${(performance.now() * 0.1) % 360}deg)`
      },
      {
        name: 'Contrast Boost',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'contrast(2) brightness(1.05)'
      },
      {
        name: 'Brightness Flash',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'brightness(2) saturate(0.5)'
      },
      {
        name: 'Night Vision',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'hue-rotate(80deg) saturate(4) brightness(0.8) contrast(1.3)'
      },
      {
        name: 'Thermal',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'hue-rotate(180deg) saturate(5) contrast(1.5) brightness(0.9)'
      },
      {
        name: 'X-Ray',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'invert(0.8) contrast(1.4) brightness(1.1)'
      },
      {
        name: 'Emboss 3D',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'contrast(1.5) brightness(1.1) saturate(0.3)'
      },
      {
        name: 'Chromatic Shift',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'saturate(2) contrast(1.2)',
        extra: 'chromatic'
      },
      {
        name: 'Zoom 1.5x',
        mask: (cx, cy, r) => {
          const bgX = -(cx * 0.5);
          const bgY = -(cy * 0.5);
          return `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
        },
        filter: 'none',
        extra: 'zoom'
      },
      {
        name: 'Pulse Ring',
        mask: (cx, cy, r) => {
          const pulse = Math.sin(performance.now() * 0.005) * 15;
          const ri = r + pulse;
          const ro = r + 30 + pulse;
          return `radial-gradient(circle ${ro}px at ${cx}px ${cy}px, transparent 0%, transparent ${(ri/ro*100).toFixed(0)}%, black ${(ri/ro*100+5).toFixed(0)}%, black 100%)`;
        },
        filter: 'none'
      },
      {
        name: 'Heart Shape',
        mask: (cx, cy, r) => {
          const s = r * 0.018;
          return `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`;
        },
        filter: 'none',
        extra: 'heart'
      },
      {
        name: 'Diamond Cut',
        mask: (cx, cy, r) =>
          `radial-gradient(circle ${r}px at ${cx}px ${cy}px, black 0%, black 40%, transparent 100%)`,
        filter: 'none',
        extra: 'diamond'
      }
    ];

    // ═══════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════

    const reveal = document.getElementById('reveal');
    const dot = document.getElementById('dot');
    const effectCanvas = document.getElementById('effectCanvas');
    const ectx = effectCanvas.getContext('2d');
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    let mx = window.innerWidth / 2;
    let my = window.innerHeight / 2;
    let cx = mx, cy = my;
    let targetR = 0;
    let currentR = 0;
    let active = false;
    let lastTouchTime = 0;
    let currentEffect = 0;

    const CIRCLE_SIZE = 200;
    const CIRCLE_SIZE_MOBILE = 140;

    // ═══════════════════════════════════════════
    // NAVIGATION SETUP
    // ═══════════════════════════════════════════

    const dotsContainer = document.getElementById('effectDots');
    const effectNameEl = document.getElementById('effectName');
    const effectCounterEl = document.getElementById('effectCounter');

    EFFECTS.forEach((_, i) => {
      const dot = document.createElement('span');
      if (i === 0) dot.classList.add('active');
      dotsContainer.appendChild(dot);
    });

    function updateNav() {
      effectNameEl.textContent = EFFECTS[currentEffect].name;
      effectCounterEl.textContent = `${currentEffect + 1} / ${EFFECTS.length}`;
      dotsContainer.querySelectorAll('span').forEach((d, i) => {
        d.classList.toggle('active', i === currentEffect);
      });
    }

    function switchEffect(dir) {
      currentEffect = (currentEffect + dir + EFFECTS.length) % EFFECTS.length;
      updateNav();
      reveal.style.filter = typeof EFFECTS[currentEffect].filter === 'function'
        ? EFFECTS[currentEffect].filter()
        : EFFECTS[currentEffect].filter;
    }

    document.getElementById('prevBtn').addEventListener('click', () => switchEffect(-1));
    document.getElementById('nextBtn').addEventListener('click', () => switchEffect(1));

    // ═══════════════════════════════════════════
    // TOUCH / MOUSE
    // ═══════════════════════════════════════════

    if (isMobile) {
      document.addEventListener('touchstart', e => {
        active = true;
        lastTouchTime = Date.now();
        const t = e.touches[0];
        mx = t.clientX;
        my = t.clientY;
        targetR = CIRCLE_SIZE_MOBILE;
      }, { passive: true });

      document.addEventListener('touchmove', e => {
        active = true;
        lastTouchTime = Date.now();
        const t = e.touches[0];
        mx = t.clientX;
        my = t.clientY;
      }, { passive: true });

      document.addEventListener('touchend', () => {
        setTimeout(() => {
          if (Date.now() - lastTouchTime > 600) {
            targetR = 0;
            active = false;
          }
        }, 600);
      });
    } else {
      targetR = CIRCLE_SIZE;
      active = true;

      document.addEventListener('mousemove', e => {
        mx = e.clientX;
        my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top = my + 'px';
      });
    }

    // ═══════════════════════════════════════════
    // KEYBOARD NAVIGATION
    // ═══════════════════════════════════════════

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') {
        switchEffect(-1);
      } else if (e.key === 'ArrowRight') {
        switchEffect(1);
      } else if (e.key === '0') {
        zeroCount++;
        clearTimeout(zeroTimer);
        zeroTimer = setTimeout(() => { zeroCount = 0; }, 1500);
        if (zeroCount >= 4) {
          zeroCount = 0;
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
          } else {
            document.exitFullscreen().catch(() => {});
          }
        }
      }
    });

    // ═══════════════════════════════════════════
    // EFFECT CANVAS RESIZE
    // ═══════════════════════════════════════════

    let ECW, ECH;
    function ecResize() {
      ECW = effectCanvas.width = window.innerWidth;
      ECH = effectCanvas.height = window.innerHeight;
    }
    ecResize();
    window.addEventListener('resize', ecResize);

    // ═══════════════════════════════════════════
    // LIGHTNING
    // ═══════════════════════════════════════════

    const lCanvas = document.getElementById('lightning');
    const lCtx = lCanvas.getContext('2d');
    let LW, LH;

    function lResize() {
      LW = lCanvas.width = window.innerWidth;
      LH = lCanvas.height = window.innerHeight;
    }
    lResize();
    window.addEventListener('resize', lResize);

    let sparks = [];

    function addSpark() {
      const angle = Math.random() * Math.PI * 2;
      const dist = 15 + Math.random() * 30;
      sparks.push({
        x: mx + Math.cos(angle) * dist,
        y: my + Math.sin(angle) * dist,
        len: 8 + Math.random() * 15,
        angle: angle + (Math.random() - 0.5) * 1.2,
        alpha: 0.6 + Math.random() * 0.4,
        decay: 0.04 + Math.random() * 0.04
      });
    }

    function drawLightning() {
      lCtx.clearRect(0, 0, LW, LH);

      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.alpha -= s.decay;
        if (s.alpha <= 0) { sparks.splice(i, 1); continue; }

        const ex = s.x + Math.cos(s.angle) * s.len;
        const ey = s.y + Math.sin(s.angle) * s.len;

        lCtx.beginPath();
        lCtx.moveTo(s.x, s.y);
        lCtx.lineTo(ex, ey);
        lCtx.strokeStyle = `rgba(180, 200, 255, ${s.alpha * 0.3})`;
        lCtx.lineWidth = 4;
        lCtx.shadowColor = 'rgba(100, 150, 255, 0.5)';
        lCtx.shadowBlur = 10;
        lCtx.stroke();
        lCtx.shadowBlur = 0;

        lCtx.beginPath();
        lCtx.moveTo(s.x, s.y);
        lCtx.lineTo(ex, ey);
        lCtx.strokeStyle = `rgba(255, 255, 255, ${s.alpha * 0.7})`;
        lCtx.lineWidth = 1;
        lCtx.stroke();
      }

      requestAnimationFrame(drawLightning);
    }

    drawLightning();

    setInterval(() => {
      if (!isMobile && active && Math.random() < 0.4) {
        addSpark();
      }
    }, 100);

    // ═══════════════════════════════════════════
    // MAIN REVEAL LOOP
    // ═══════════════════════════════════════════

    function loop() {
      cx += (mx - cx) * 0.25;
      cy += (my - cy) * 0.25;
      currentR += (targetR - currentR) * 0.1;

      const eff = EFFECTS[currentEffect];

      if (typeof eff.filter === 'function') {
        reveal.style.filter = eff.filter();
      }

      if (eff.extra === 'chromatic') {
        ectx.clearRect(0, 0, ECW, ECH);
        if (currentR > 0.5) {
          const shift = 4;
          ectx.globalCompositeOperation = 'screen';
          ectx.beginPath();
          ectx.arc(cx, cy, currentR, 0, Math.PI * 2);
          ectx.fillStyle = 'rgba(255, 0, 0, 0.15)';
          ectx.fill();
          ectx.beginPath();
          ectx.arc(cx + shift, cy - shift, currentR, 0, Math.PI * 2);
          ectx.fillStyle = 'rgba(0, 255, 0, 0.15)';
          ectx.fill();
          ectx.beginPath();
          ectx.arc(cx - shift, cy + shift, currentR, 0, Math.PI * 2);
          ectx.fillStyle = 'rgba(0, 0, 255, 0.15)';
          ectx.fill();
          ectx.globalCompositeOperation = 'source-over';
        }
      } else if (eff.extra === 'zoom') {
        const zoomScale = 1.5;
        const bgX = cx * (1 - zoomScale);
        const bgY = cy * (1 - zoomScale);
        reveal.style.backgroundPosition = `${bgX - 45}px ${bgY}px`;
        reveal.style.backgroundSize = `${100 * zoomScale}%`;
      } else if (eff.extra === 'heart') {
        ectx.clearRect(0, 0, ECW, ECH);
        if (currentR > 0.5) {
          const s = currentR * 0.015;
          ectx.save();
          ectx.translate(cx, cy);
          ectx.scale(s, s);
          ectx.beginPath();
          ectx.moveTo(0, 10);
          ectx.bezierCurveTo(-20, -10, -40, -10, -40, -30);
          ectx.bezierCurveTo(-40, -50, 0, -50, 0, -25);
          ectx.bezierCurveTo(0, -50, 40, -50, 40, -30);
          ectx.bezierCurveTo(40, -10, 20, -10, 0, 10);
          ectx.closePath();
          ectx.clip();
          ectx.drawImage(
            reveal, 0, 0, ECW, ECH
          );
          ectx.restore();
        }
      } else if (eff.extra === 'diamond') {
        ectx.clearRect(0, 0, ECW, ECH);
        if (currentR > 0.5) {
          ectx.save();
          ectx.translate(cx, cy);
          ectx.rotate(Math.PI / 4);
          const half = currentR * 0.8;
          ectx.beginPath();
          ectx.rect(-half, -half, half * 2, half * 2);
          ectx.clip();
          ectx.drawImage(
            reveal, -cx, -cy, ECW, ECH
          );
          ectx.restore();
        }
      } else {
        ectx.clearRect(0, 0, ECW, ECH);
        if (eff.extra !== 'zoom') {
          reveal.style.backgroundPosition = '-45px center';
          reveal.style.backgroundSize = 'cover';
        }
      }

      if (currentR > 0.5) {
        reveal.style.maskImage = eff.mask(cx, cy, currentR);
        reveal.style.webkitMaskImage = eff.mask(cx, cy, currentR);
      } else {
        reveal.style.maskImage =
          `radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%)`;
        reveal.style.webkitMaskImage =
          `radial-gradient(circle 0px at 50% 50%, black 0%, transparent 100%)`;
      }

      requestAnimationFrame(loop);
    }

    loop();

    // ═══════════════════════════════════════════
    // WELCOME TEXT ANIMATION
    // ═══════════════════════════════════════════

    const welcomeText = 'welcome to xoleric portfolio';
    const welcomeEl = document.getElementById('welcome');
    const letterEls = [];
    welcomeText.split('').forEach((char, index) => {
      const span = document.createElement('span');
      span.textContent = char;
      span.classList.add('letter');
      span.style.animationDelay = `${index * 0.1}s`;
      welcomeEl.appendChild(span);
      letterEls.push(span);
      setTimeout(() => {
        span.classList.add('visible');
      }, index * 120);
    });

    // Magnetic letter effect
    const LETTER_RADIUS = 150;
    const LETTER_FORCE = 35;
    const letterStates = letterEls.map(() => ({
      offsetX: 0, offsetY: 0,
      velocityX: 0, velocityY: 0,
      glowIntensity: 0,
      scaleBoost: 0,
      rotX: 0, rotY: 0
    }));

    function updateLetters() {
      letterEls.forEach((span, i) => {
        if (!span.classList.contains('visible')) return;
        const rect = span.getBoundingClientRect();
        const lx = rect.left + rect.width / 2;
        const ly = rect.top + rect.height / 2;

        let dx = mx - lx;
        let dy = my - ly;
        const dist = Math.sqrt(dx * dx + dy * dy);

        const state = letterStates[i];
        let forceX = 0, forceY = 0;
        let glow = 0, scale = 0;
        let rX = 0, rY = 0;

        if (dist < LETTER_RADIUS && dist > 0) {
          const strength = 1 - dist / LETTER_RADIUS;
          const power = strength * strength;
          forceX = -(dx / dist) * LETTER_FORCE * power;
          forceY = -(dy / dist) * LETTER_FORCE * power;
          glow = power;
          scale = power * 0.15;
          rX = -(dy / dist) * 20 * power;
          rY = (dx / dist) * 20 * power;
        }

        state.velocityX += forceX;
        state.velocityY += forceY;
        state.velocityX *= 0.88;
        state.velocityY *= 0.88;
        state.offsetX += state.velocityX;
        state.offsetY += state.velocityY;

        const returnForce = 0.12;
        state.offsetX += -state.offsetX * returnForce;
        state.offsetY += -state.offsetY * returnForce;

        state.glowIntensity += (glow - state.glowIntensity) * 0.15;
        state.scaleBoost += (scale - state.scaleBoost) * 0.15;
        state.rotX += (rX - state.rotX) * 0.1;
        state.rotY += (rY - state.rotY) * 0.1;

        const s = 1 + state.scaleBoost;
        const g = state.glowIntensity;
        const hue = 190 + g * 60;

        span.style.transform =
          `translate(${state.offsetX}px, ${state.offsetY}px) scale(${s}) perspective(500px) rotateX(${state.rotX}deg) rotateY(${state.rotY}deg)`;
        span.style.textShadow =
          `0 0 ${10 + g * 30}px hsla(${hue}, 100%, 70%, ${0.3 + g * 0.7}),
           0 0 ${20 + g * 50}px hsla(${hue}, 100%, 60%, ${0.1 + g * 0.5}),
           0 0 ${5 + g * 15}px rgba(255,255,255,${g * 0.4})`;
        span.style.color = g > 0.3
          ? `hsl(${hue}, ${60 + g * 40}%, ${80 + g * 15}%)`
          : 'rgba(230, 230, 230, 0.9)';
      });
    }

    // ═══════════════════════════════════════════
    // NEURONS
    // ═══════════════════════════════════════════

    const pc = document.getElementById('particles');
    const pctx = pc.getContext('2d');
    let PW, PH;
    function pResize() {
      PW = pc.width = window.innerWidth;
      PH = pc.height = window.innerHeight;
    }
    pResize();
    window.addEventListener('resize', pResize);

    const NEURON_COUNT = 40;
    const CONNECT_DIST = 200;
    const CURSOR_REPEL = 250;
    const REVEAL_REPEL = 220;
    const neurons = [];

    function createNeuron() {
      let x, y;
      do {
        x = Math.random() * PW;
        y = Math.random() * PH;
      } while (Math.sqrt((x - mx) ** 2 + (y - my) ** 2) < CURSOR_REPEL);
      return {
        x, y,
        vx: (Math.random() - 0.5) * 0.02,
        vy: (Math.random() - 0.5) * 0.02,
        size: Math.random() * 4 + 3,
        opacity: Math.random() * 0.6 + 0.3,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.003 + 0.001,
        drift: Math.random() * Math.PI * 2,
        driftSpeed: Math.random() * 0.0004 + 0.0001,
        driftRadius: Math.random() * 0.012 + 0.004
      };
    }

    for (let i = 0; i < NEURON_COUNT; i++) {
      neurons.push(createNeuron());
    }

    function drawNeurons() {
      pctx.clearRect(0, 0, PW, PH);

      for (let i = 0; i < neurons.length; i++) {
        const n = neurons[i];

        const dx = mx - n.x;
        const dy = my - n.y;
        const distToCursor = Math.sqrt(dx * dx + dy * dy);
        if (distToCursor < CURSOR_REPEL && distToCursor > 0) {
          const force = (1 - distToCursor / CURSOR_REPEL) * 0.4;
          n.vx -= (dx / distToCursor) * force;
          n.vy -= (dy / distToCursor) * force;
        }

        const dxr = cx - n.x;
        const dyr = cy - n.y;
        const distToReveal = Math.sqrt(dxr * dxr + dyr * dyr);
        if (distToReveal < REVEAL_REPEL && distToReveal > 0) {
          const force = (1 - distToReveal / REVEAL_REPEL) * 0.25;
          n.vx -= (dxr / distToReveal) * force;
          n.vy -= (dyr / distToReveal) * force;
        }

        n.vx *= 0.96;
        n.vy *= 0.96;

        n.drift += n.driftSpeed;
        n.vx += Math.sin(n.drift) * n.driftRadius;
        n.vy += Math.cos(n.drift * 0.7) * n.driftRadius;

        n.x += n.vx;
        n.y += n.vy;
        n.pulse += n.pulseSpeed;

        if (n.x < -30) n.x = PW + 30;
        if (n.x > PW + 30) n.x = -30;
        if (n.y < -30) n.y = PH + 30;
        if (n.y > PH + 30) n.y = -30;
      }

      for (let i = 0; i < neurons.length; i++) {
        for (let j = i + 1; j < neurons.length; j++) {
          const a = neurons[i];
          const b = neurons[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < CONNECT_DIST) {
            const t = (1 - dist / CONNECT_DIST);
            pctx.beginPath();
            pctx.moveTo(a.x, a.y);
            pctx.lineTo(b.x, b.y);
            pctx.strokeStyle = `rgba(210, 170, 0, ${t * 0.5})`;
            pctx.lineWidth = t * 1.5;
            pctx.stroke();
          }
        }
      }

      for (let i = 0; i < neurons.length; i++) {
        const n = neurons[i];
        const pulseFactor = 0.6 + Math.sin(n.pulse) * 0.4;
        const alpha = n.opacity * pulseFactor;

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size * 2, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.1})`;
        pctx.fill();

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
        pctx.fill();

        pctx.beginPath();
        pctx.arc(n.x, n.y, n.size * 0.5, 0, Math.PI * 2);
        pctx.fillStyle = `rgba(20, 18, 0, ${alpha * 0.8})`;
        pctx.fill();
      }

      requestAnimationFrame(drawNeurons);
      updateLetters();
    }

    drawNeurons();

    // 4x "0" = fullscreen
    let zeroCount = 0;
    let zeroTimer = null;
  </script>
</body>
</html>
