<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Globe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: 400vh;
      background: #000;
    }

    body {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
    }

    .globe-scene {
      position: relative;
      width: 400px;
      height: 400px;
      transform-style: preserve-3d;
    }

    .globe-sphere {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      transform-style: preserve-3d;
      overflow: hidden;
    }

    .globe-sphere img {
      width: 140%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: -20%;
      transform-origin: center center;
    }

    .globe-shadow {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 40px;
      background: radial-gradient(ellipse, rgba(0,100,255,0.2) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(10px);
    }

    .globe-atmosphere {
      position: absolute;
      top: -8px; left: -8px;
      right: -8px; bottom: -8px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(80,160,255,0.15), transparent 50%);
      pointer-events: none;
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .progress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #0066ff, #00ccff, #0066ff);
      z-index: 100;
      width: 0%;
    }

    .label {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-family: 'SF Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas class="stars" id="stars"></canvas>
  <div class="progress" id="progress"></div>

  <div class="globe-scene" id="scene">
    <div class="globe-atmosphere"></div>
    <div class="globe-sphere" id="sphere">
      <img id="earth" src="https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg" alt="Earth">
    </div>
    <div class="globe-shadow"></div>
  </div>

  <div class="label">scroll to rotate</div>

  <script>
    // Stars
    const starsCanvas = document.getElementById('stars');
    const sctx = starsCanvas.getContext('2d');
    let SW, SH;
    function sResize() { SW = starsCanvas.width = window.innerWidth; SH = starsCanvas.height = window.innerHeight; }
    sResize(); window.addEventListener('resize', sResize);

    const stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, r: Math.random() * 1.2 + 0.3, a: Math.random() * 0.6 + 0.2, p: Math.random() * Math.PI * 2 });
    }

    function drawStars(t) {
      sctx.clearRect(0, 0, SW, SH);
      stars.forEach(s => {
        const flicker = 0.5 + Math.sin(t * 0.001 + s.p) * 0.5;
        sctx.beginPath();
        sctx.arc(s.x % SW, s.y % SH, s.r, 0, Math.PI * 2);
        sctx.fillStyle = `rgba(200, 220, 255, ${s.a * flicker})`;
        sctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars(0);

    // Globe
    const scene = document.getElementById('scene');
    const sphere = document.getElementById('sphere');
    const earth = document.getElementById('earth');
    const progressBar = document.getElementById('progress');

    const totalScroll = document.documentElement.scrollHeight - window.innerHeight;
    let scrollY = 0;
    let targetScrollY = 0;

    // Animation state
    let globeY = window.innerHeight * 0.7;
    let globeScale = 0.2;
    let globeRotateY = 0;
    let globeRotateX = 5;
    let autoRotate = 0;

    window.addEventListener('scroll', () => {
      targetScrollY = window.scrollY;
    }, { passive: true });

    function lerp(a, b, t) { return a + (b - a) * t; }

    function animate() {
      scrollY = lerp(scrollY, targetScrollY, 0.08);
      const progress = scrollY / totalScroll;

      // Phase 1: 0 -> 0.35 — Globe rises from bottom (2x slower)
      // Phase 2: 0.35 -> 0.6 — Globe stops, starts 3D rotation
      // Phase 3: 0.6 -> 1.0 — Full 3D rotation, globe holds at center

      let targetY, targetScale, targetRotX;

      if (progress < 0.35) {
        // Rising phase — 2x slower
        const p = progress / 0.35;
        const eased = 1 - Math.pow(1 - p, 2);

        targetY = lerp(window.innerHeight * 0.7, 0, eased);
        targetScale = lerp(0.2, 1, eased);
        targetRotX = 5;

      } else if (progress < 0.6) {
        // Transition — stop and start rotating
        const p = (progress - 0.35) / 0.25;

        targetY = 0;
        targetScale = lerp(1, 1.1, p);
        targetRotX = lerp(5, 0, p);

      } else {
        // Full rotation
        const p = (progress - 0.6) / 0.4;
        const pulse = Math.sin(p * Math.PI * 6) * 0.02;

        targetY = 0;
        targetScale = 1.1 + pulse;
        targetRotX = 0;
      }

      // Smooth interpolation
      globeY = lerp(globeY, targetY, 0.1);
      globeScale = lerp(globeScale, targetScale, 0.1);
      globeRotateX = lerp(globeRotateX, targetRotX, 0.1);

      // Auto-rotate increases with scroll
      if (progress > 0.35) {
        autoRotate += 0.3 + (progress - 0.35) * 2;
      } else {
        autoRotate += 0.05;
      }

      // Scroll-driven rotation
      const scrollRotation = progress * 360 * 2;

      // Apply 3D transforms
      const rotY = autoRotate + scrollRotation;
      const rotX = globeRotateX + Math.sin(autoRotate * 0.01) * 3;

      scene.style.transform = `translateY(${globeY}px) scale(${globeScale})`;
      sphere.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;

      // Image offset for continuous scroll illusion
      const imgOffset = (rotY % 360) / 360 * 40;
      earth.style.left = `${-20 - imgOffset}%`;

      progressBar.style.width = `${progress * 100}%`;

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
