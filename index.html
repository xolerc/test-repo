<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe Scroll Effect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: 500vh;
      background: #000;
    }

    body {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .globe-wrapper {
      position: relative;
      width: 500px;
      height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .globe {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      transition: border-radius 0.1s ease, box-shadow 0.1s ease;
      will-change: transform, border-radius, clip-path;
    }

    .globe img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
    }

    .globe-glow {
      position: absolute;
      top: -20px; left: -20px;
      right: -20px; bottom: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 100, 255, 0.15) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .atmosphere {
      position: absolute;
      top: -3px; left: -3px;
      right: -3px; bottom: -3px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(100, 180, 255, 0.2), transparent 60%);
      pointer-events: none;
      opacity: 0;
    }

    .info {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      z-index: 10;
      animation: fadeInUp 1s ease 0.5s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .scroll-indicator {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      z-index: 10;
      animation: fadeInUp 1s ease 0.8s both;
    }

    .scroll-indicator::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 8px;
      background: rgba(255,255,255,0.4);
      border-radius: 2px;
      animation: scrollDot 1.5s ease-in-out infinite;
    }

    @keyframes scrollDot {
      0%, 100% { top: 8px; opacity: 1; }
      50% { top: 20px; opacity: 0.3; }
    }

    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #0066ff, #00ccff);
      z-index: 100;
      transition: width 0.1s ease;
    }

    .bg-particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <canvas class="bg-particles" id="bgParticles"></canvas>
  <div class="progress-bar" id="progressBar"></div>

  <div class="globe-wrapper" id="globeWrapper">
    <div class="globe-glow" id="globeGlow"></div>
    <div class="atmosphere" id="atmosphere"></div>
    <div class="globe" id="globe">
      <img id="earthImg" src="https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg" alt="Earth" crossorigin="anonymous">
    </div>
  </div>

  <div class="scroll-indicator" id="scrollIndicator"></div>
  <div class="info" id="info">scroll to explore</div>

  <script>
    // ═══════════════════════════════════════════
    // BACKGROUND PARTICLES
    // ═══════════════════════════════════════════
    const bgCanvas = document.getElementById('bgParticles');
    const bgCtx = bgCanvas.getContext('2d');
    let BGW, BGH;

    function bgResize() {
      BGW = bgCanvas.width = window.innerWidth;
      BGH = bgCanvas.height = window.innerHeight;
    }
    bgResize();
    window.addEventListener('resize', bgResize);

    const bgStars = [];
    for (let i = 0; i < 80; i++) {
      bgStars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.2,
        speed: Math.random() * 0.0005 + 0.0002,
        phase: Math.random() * Math.PI * 2
      });
    }

    function drawBgParticles(t) {
      bgCtx.clearRect(0, 0, BGW, BGH);
      bgStars.forEach(s => {
        const flicker = 0.5 + Math.sin(t * s.speed + s.phase) * 0.5;
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(180, 200, 255, ${s.alpha * flicker})`;
        bgCtx.fill();
      });
      requestAnimationFrame(drawBgParticles);
    }
    drawBgParticles(0);

    // ═══════════════════════════════════════════
    // GLOBE SCROLL ANIMATION
    // ═══════════════════════════════════════════
    const globe = document.getElementById('globe');
    const globeWrapper = document.getElementById('globeWrapper');
    const earthImg = document.getElementById('earthImg');
    const globeGlow = document.getElementById('globeGlow');
    const atmosphere = document.getElementById('atmosphere');
    const progressBar = document.getElementById('progressBar');
    const scrollIndicator = document.getElementById('scrollIndicator');
    const infoEl = document.getElementById('info');

    const totalScroll = document.documentElement.scrollHeight - window.innerHeight;
    let scrollProgress = 0;
    let targetProgress = 0;

    let imgRotation = 0;
    let currentScale = 0.3;
    let currentY = window.innerHeight * 0.8;
    let currentSkew = 0;
    let currentBorderRadius = 50;

    function lerp(a, b, t) { return a + (b - a) * t; }

    window.addEventListener('scroll', () => {
      targetProgress = window.scrollY / totalScroll;
    }, { passive: true });

    function animate() {
      scrollProgress = lerp(scrollProgress, targetProgress, 0.08);

      const progress = scrollProgress;
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      // Phase 1: Scroll up from bottom (0 -> 0.4)
      // Phase 2: Stop at center, morph (0.4 -> 0.7)
      // Phase 3: Hold at center (0.7 -> 1.0)

      let translateY, scale, borderRadiusVal, glowAlpha, atmAlpha, imgOffset;
      let skewAngle = 0;

      if (progress < 0.4) {
        // Rising phase: globe comes up from bottom, 2x slower
        const p = progress / 0.4;
        const eased = 1 - Math.pow(1 - p, 3);

        translateY = lerp(window.innerHeight * 0.6, 0, eased);
        scale = lerp(0.3, 1, eased);
        borderRadiusVal = 50;
        glowAlpha = 0;
        atmAlpha = 0;
        imgOffset = 0;
        skewAngle = 0;

        scrollIndicator.style.opacity = 1;
        infoEl.style.opacity = 1;

      } else if (progress < 0.7) {
        // Morph phase: globe transforms at center
        const p = (progress - 0.4) / 0.3;
        const eased = p;

        translateY = 0;
        scale = lerp(1, 1.15, eased);

        // Shape morph: circle -> rounded square -> back to circle
        if (p < 0.5) {
          borderRadiusVal = lerp(50, 20, p * 2);
        } else {
          borderRadiusVal = lerp(20, 50, (p - 0.5) * 2);
        }

        glowAlpha = lerp(0, 1, eased);
        atmAlpha = lerp(0, 1, eased);
        imgOffset = eased * 30;
        skewAngle = Math.sin(p * Math.PI) * 5;

        scrollIndicator.style.opacity = 0;
        infoEl.textContent = 'xoleric';
        infoEl.style.opacity = 1;

      } else {
        // Hold phase: globe stays at center, slight pulse
        const p = (progress - 0.7) / 0.3;
        const pulse = Math.sin(p * Math.PI * 4) * 0.03;

        translateY = 0;
        scale = 1.15 + pulse;
        borderRadiusVal = 50;
        glowAlpha = 1;
        atmAlpha = 1;
        imgOffset = 30;
        skewAngle = 0;

        scrollIndicator.style.opacity = 0;
      }

      // Apply transforms
      imgRotation += 0.15;

      globe.style.transform = `scale(${scale}) skewY(${skewAngle}deg)`;
      globe.style.borderRadius = `${borderRadiusVal}%`;

      earthImg.style.transform = `translateX(${-imgOffset + Math.sin(imgRotation * 0.01) * 5}px) rotate(${imgRotation * 0.1}deg)`;

      globeGlow.style.opacity = glowAlpha;
      globeGlow.style.transform = `scale(${1 + glowAlpha * 0.2})`;

      atmosphere.style.opacity = atmAlpha;
      atmosphere.style.transform = `scale(${1 + atmAlpha * 0.1})`;

      progressBar.style.width = `${progress * 100}%`;

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
